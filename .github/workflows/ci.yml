name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lockfile-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce npm lockfile policy
        run: |
          test ! -f frontend/bun.lock
          test ! -f backend/services/auth-service/bun.lock
          test -f frontend/package-lock.json
          test -f backend/services/auth-service/package-lock.json
          test -f backend/services/prompt-service/package-lock.json
          test -f backend/services/notification-service/package-lock.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  auth-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test

  prompt-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/prompt-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test

  notification-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test
